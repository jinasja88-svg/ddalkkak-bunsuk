<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 500px;
      min-height: 300px;
      max-height: 600px;
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow-y: auto;
    }

    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 18px; color: #fff; }
    .header .emoji { font-size: 24px; }

    .controls {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #2a2a4a;
    }

    .btn {
      flex: 1;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: #2a2a4a;
      color: #b0b0d0;
      border: 1px solid #3a3a5a;
    }
    .btn-secondary:hover { background: #3a3a5a; }

    .status {
      padding: 10px 16px;
      font-size: 12px;
      color: #8888aa;
      border-bottom: 1px solid #2a2a4a;
    }
    .status .step { margin: 3px 0; }
    .status .step.active { color: #667eea; }
    .status .step.done { color: #4ade80; }
    .status .step.error { color: #f87171; }

    .token-info {
      padding: 10px 16px;
      background: #16162a;
      border-bottom: 1px solid #2a2a4a;
      font-size: 11px;
      color: #6666aa;
      display: none;
    }
    .token-info.show { display: flex; gap: 16px; flex-wrap: wrap; }
    .token-info span { white-space: nowrap; }
    .token-info .cost { color: #4ade80; font-weight: 600; }

    .result {
      padding: 16px;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .result h1, .result h2, .result h3 { color: #a5b4fc; margin: 12px 0 6px; }
    .result strong { color: #c4b5fd; }
    .result ul, .result ol { padding-left: 20px; }

    .custom-prompt {
      padding: 8px 16px;
      border-bottom: 1px solid #2a2a4a;
    }
    .custom-prompt textarea {
      width: 100%;
      height: 60px;
      background: #16162a;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 8px;
      font-size: 13px;
      resize: vertical;
    }
    .custom-prompt textarea:focus { outline: none; border-color: #667eea; }

    .mode-toggle {
      padding: 8px 16px;
      display: flex;
      gap: 6px;
      border-bottom: 1px solid #2a2a4a;
    }
    .mode-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid #3a3a5a;
      background: transparent;
      color: #8888aa;
      font-size: 11px;
      cursor: pointer;
    }
    .mode-btn.active {
      background: #667eea;
      color: #fff;
      border-color: #667eea;
    }

    .loading-dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="emoji">🖱️</span>
    <h1>딸깍분석</h1>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn" data-mode="off">기본 (DOM만)</button>
    <button class="mode-btn active" data-mode="turbo">터보 (검색+)</button>
  </div>

  <div class="custom-prompt">
    <textarea id="userPrompt" placeholder="분석 요청을 입력하세요 (비우면 기본 분석)">이 사이트의 제품을 아주 상세하게 강점, 단점, 스펙 등 분석해서 알려줘</textarea>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="analyzeBtn">🖱️ 딸깍 분석하기</button>
    <button class="btn btn-secondary" id="copyBtn" style="flex:0.4" disabled>복사</button>
  </div>

  <div class="status" id="status"></div>
  <div class="token-info" id="tokenInfo"></div>
  <div class="result" id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
