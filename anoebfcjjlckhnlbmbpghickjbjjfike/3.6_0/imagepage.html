<!DOCTYPE html>

    <title>Image Gallery with Radio Box</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    
    
    <style>
        .image-thumbnail {
            position: relative;
            display: inline-block;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .image-thumbnail img {
            width: 100px;
            height: 100px;
            object-fit: cover;
        }

        .image-radio {
            position: absolute;
            top: -2px;
            left: 2px;
            z-index: 5;
        }

        .delete-btn {
            position: absolute;
            top: -2px;
            right: 2px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .image-size-info {
            position: absolute;
            bottom: 2px;
            left: 2px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 10px;
            padding: 2px 4px;
            border-radius: 3px;
            z-index: 10;
            display: none;
        }

        #editor_container {
            width: 1000px;
            height: 700px;
        }

        /* .selected-image {
      width: 50%;
      height: 50%;
    } */
        .vertical-separator {
            border-left: 1px solid black;
            height: 100px;
            /* 세로선의 높이를 조정할 수 있습니다. */
            margin: 10px;
        }
    </style>
    <script src="js/filerobot-image-editor.min.js"></script>
</head>
